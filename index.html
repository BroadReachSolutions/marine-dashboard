            <div class="widgetControls">
              <button id="layoutSettingsBtn" class="widgetSettingsBtn" title="Dashboard settings">⚙</button>
            </div>
            <div class="widgetHandle"></div>
            <button id="layoutToggle" class="layoutToggle">Edit Layout</button>

            <div class="widgetSettingsPanel dashboardSettingsPanel" data-settings-for="layout">

                <div class="settingsTitle">Dashboard Settings</div>
                <button class="closeSettingsBtn" type="button">✕</button>
              </div>

              <div class="settingsRow">
                <label for="dashboardBackgroundColor">Background Color</label>
                <input type="color" id="dashboardBackgroundColor" value="#07131c">
              </div>

              <div class="settingsRow">
                <label for="dashboardBackgroundHue">Background Hue</label>
                <input type="range" id="dashboardBackgroundHue" min="0" max="360" value="0">
              </div>

              <div class="settingsActions">
                <button type="button" id="dashboardResetBtn" class="settingsActionBtn">Default</button>
              </div>
            </div>

            <div class="widgetResize"></div>
          </div>
        </div>

                  <option value="ocean">Ocean</option>
                  <option value="sunset">Sunset</option>
