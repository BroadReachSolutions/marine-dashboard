<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marine Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <!-- PWA support -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Marine">
  <link rel="apple-touch-icon" href="staugustine-sailing-logo.png">
</head>
<body>
  <div id="app">
    <div id="dashboardStage">
      <div id="dashboard">

        <div class="widget" data-widget="layout" id="layoutWidget">
          <div class="widgetFrame">
            <div class="widgetControls">
              <button id="layoutSettingsBtn" class="widgetSettingsBtn" title="Dashboard settings">⚙</button>
            </div>
            <div class="widgetHandle"></div>
            <button id="layoutToggle" class="layoutToggle">Edit Layout</button>
            <div class="widgetSettingsPanel dashboardSettingsPanel" data-settings-for="layout">
              <div class="settingsHeader">
                <div class="settingsTitle">Dashboard Settings</div>
                <button class="closeSettingsBtn" type="button">✕</button>
              </div>
              <div class="settingsRow">
                <label for="dashboardBackgroundColor">Background Color</label>
                <input type="color" id="dashboardBackgroundColor" value="#07131c">
              </div>
              <div class="settingsRow">
                <label for="dashboardBackgroundHue">Background Hue</label>
                <input type="range" id="dashboardBackgroundHue" min="0" max="360" value="0">
              </div>
              <div class="settingsActions">
                <button type="button" id="dashboardResetBtn" class="settingsActionBtn">Default</button>
              </div>
            </div>
            <div class="widgetResize"></div>
          </div>
        </div>

        <div class="widget" data-widget="stations" id="stationsWidget">
          <div class="widgetFrame">
            <div class="widgetControls">
              <button class="widgetSettingsBtn" type="button" title="Widget settings">⚙</button>
              <button class="widgetHideBtn" type="button" title="Hide widget">👁</button>
            </div>
            <div class="widgetHandle"></div>
            <div class="stationPanel">
              <div class="stationBar">
                <label for="stationSelect" class="stationLabel">Station</label>
                <select id="stationSelect"></select>
              </div>
              <div class="dateBar">
                <label for="tideDateSelect" class="stationLabel">Tide Date</label>
                <input type="date" id="tideDateSelect">
                <button id="viewDateBtn" class="dateBtn">View Day</button>
                <button id="liveViewBtn" class="dateBtn">Return to Live</button>
              </div>
            </div>
            <div class="widgetSettingsPanel" data-settings-for="stations">
              <div class="settingsHeader">
                <div class="settingsTitle">Station Widget</div>
                <button class="closeSettingsBtn" type="button">✕</button>
              </div>
              <div class="settingsRow">
                <label>Theme</label>
                <select class="themeSelect" data-setting="theme">
                  <option value="default">Default</option>
                  <option value="clean">Clean</option>
                  <option value="glass">Glass</option>
                  <option value="ocean">Ocean</option>
                  <option value="sunset">Sunset</option>
                </select>
              </div>
              <div class="settingsRow">
                <label>Widget Background</label>
                <input type="color" class="widgetBgColorInput" data-setting="backgroundColor" value="#0a1924">
              </div>
              <div class="settingsRow">
                <label>Row 1 Font</label>
                <select class="fontSelect" data-target="row1Font">
                  <option value="Segoe UI">Segoe UI</option>
                  <option value="Arial">Arial</option>
                  <option value="Verdana">Verdana</option>
                  <option value="Georgia">Georgia</option>
                  <option value="Trebuchet MS">Trebuchet MS</option>
                </select>
              </div>
              <div class="settingsRow">
                <label>Row 1 Font Color</label>
                <input type="color" class="fontColorInput" data-target="row1Color" value="#eef7ff">
              </div>
              <div class="settingsRow">
                <label>Row 1 Alert Color</label>
                <input type="color" class="alertColorInput" data-target="row1AlertColor" value="#ff7c7c">
              </div>
              <div class="settingsRow">
                <label>Row 2 Font</label>
                <select class="fontSelect" data-target="row2Font">
                  <option value="Segoe UI">Segoe UI</option>
                  <option value="Arial">Arial</option>
                  <option value="Verdana">Verdana</option>
                  <option value="Georgia">Georgia</option>
                  <option value="Trebuchet MS">Trebuchet MS</option>
                </select>
              </div>
              <div class="settingsRow">
                <label>Row 2 Font Color</label>
                <input type="color" class="fontColorInput" data-target="row2Color" value="#9fc2d9">
              </div>
              <div class="settingsRow">
                <label>Row 2 Alert Color</label>
                <input type="color" class="alertColorInput" data-target="row2AlertColor" value="#ff7c7c">
              </div>
              <div class="settingsActions">
                <button type="button" class="settingsActionBtn resetWidgetBtn">Default</button>
              </div>
            </div>
            <div class="widgetResize"></div>
          </div>
        </div>

        <!-- Wind / Compass — top section on mobile -->
        <div class="widget" data-widget="wind" id="windWidget">
          <div class="widgetFrame">
            <div class="widgetControls">
              <button class="widgetSettingsBtn" type="button" title="Widget settings">⚙</button>
              <button class="widgetHideBtn" type="button" title="Hide widget">👁</button>
            </div>
            <div class="widgetHandle"></div>
            <div class="windBox">
              <div class="windReadings" id="windReadings"></div>
              <div class="compassOuter" id="compassOuter">
                <div class="compassCardinals" id="compassCardinals">
                  <div class="cardinal" id="cardinalN">N</div>
                  <div class="cardinal" id="cardinalE">E</div>
                  <div class="cardinal" id="cardinalS">S</div>
                  <div class="cardinal" id="cardinalW">W</div>
                </div>
                <div class="compass" id="compassWidget">
                  <canvas id="compassMapCanvas"></canvas>
                  <canvas id="radarCanvas" style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;border-radius:12px;z-index:10;"></canvas>
                  <iframe id="radarIframe" style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;border:none;border-radius:12px;z-index:10;" allowfullscreen></iframe>
                  <div class="ring" id="compassRing"></div>
                  <div class="arrow" id="windArrow"></div>
                </div>
              </div>
              <div class="windDir" id="windDir"></div>
            </div>
            <div class="widgetSettingsPanel" data-settings-for="wind">
              <div class="settingsHeader">
                <div class="settingsTitle">Wind Widget</div>
                <button class="closeSettingsBtn" type="button">✕</button>
              </div>
              <div class="settingsRow">
                <label>Theme</label>
                <select class="themeSelect" data-setting="theme">
                  <option value="default">Default</option>
                  <option value="clean">Clean</option>
                  <option value="glass">Glass</option>
                  <option value="ocean">Ocean</option>
                  <option value="sunset">Sunset</option>
                </select>
              </div>
              <div class="settingsRow">
                <label>Widget Background</label>
                <input type="color" class="widgetBgColorInput" data-setting="backgroundColor" value="#0a1924">
              </div>
              <div class="settingsRow">
                <label>Row 1 Font</label>
                <select class="fontSelect" data-target="row1Font">
                  <option value="Segoe UI">Segoe UI</option>
                  <option value="Arial">Arial</option>
                  <option value="Verdana">Verdana</option>
                  <option value="Georgia">Georgia</option>
                  <option value="Trebuchet MS">Trebuchet MS</option>
                </select>
              </div>
              <div class="settingsRow">
                <label>Row 1 Font Color</label>
                <input type="color" class="fontColorInput" data-target="row1Color" value="#d9f2ff">
              </div>
              <div class="settingsRow">
                <label>Row 2 Font</label>
                <select class="fontSelect" data-target="row2Font">
                  <option value="Segoe UI">Segoe UI</option>
                  <option value="Arial">Arial</option>
                  <option value="Verdana">Verdana</option>
                  <option value="Georgia">Georgia</option>
                  <option value="Trebuchet MS">Trebuchet MS</option>
                </select>
              </div>
              <div class="settingsRow">
                <label>Row 2 Font Color</label>
                <input type="color" class="fontColorInput" data-target="row2Color" value="#b9dcec">
              </div>
              <div class="settingsRow">
                <label>Address</label>
                <div style="display:flex;gap:6px;">
                  <input id="marineAddressInput" type="text" placeholder="Enter address..." style="flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(125,186,220,0.3);border-radius:6px;color:#eef7ff;padding:4px 7px;font-size:12px;min-width:0;" />
                  <button id="marineAddressBtn" type="button" style="background:rgba(100,180,255,0.18);border:1px solid rgba(100,180,255,0.35);border-radius:6px;color:#eef7ff;padding:4px 9px;font-size:12px;cursor:pointer;white-space:nowrap;">Set</button>
                </div>
              </div>
              <div class="settingsRow">
                <label>Map Zoom</label>
                <input type="range" id="compassZoom" min="12" max="18" value="15" style="width:100%;" />
                <span id="compassZoomLabel" style="font-size:11px;color:#aac;">15</span>
              </div>
              <div class="settingsRow">
                <label>Map Display</label>
                <select id="compassMapMode">
                  <option value="none">No map</option>
                  <option value="compass">Satellite — compass circle</option>
                  <option value="widget">Satellite — fill widget</option>
                  <option value="radar">Radar</option>
                </select>
              </div>
              <div class="settingsRow" id="radarSpeedRow" style="display:none;">
                <label>Radar Speed</label>
                <input type="range" id="radarSpeed" min="1" max="10" value="5" style="width:100%;" />
                <span id="radarSpeedLabel" style="font-size:11px;color:#aac;">5</span>
              </div>
              <div class="settingsRow">
                <label>Cardinal Distance</label>
                <input type="range" id="cardinalOffset" min="0" max="60" value="20" style="width:100%;" />
                <span id="cardinalOffsetLabel" style="font-size:11px;color:#aac;">20px</span>
              </div>
              <div class="settingsRow">
                <label>Compass Style</label>
                <select id="compassStyle">
                  <option value="ring">Ring</option>
                  <option value="crosshair">Crosshair</option>
                  <option value="nautical">Nautical</option>
                  <option value="minimal">Minimal</option>
                </select>
              </div>
              <div class="settingsRow">
                <label>Show Wind Info</label>
                <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;">
                  <label style="display:flex;align-items:center;gap:4px;font-size:12px;white-space:nowrap;">
                    <input type="checkbox" id="showWindMph" checked /> mph |
                  </label>
                  <label style="display:flex;align-items:center;gap:4px;font-size:12px;white-space:nowrap;">
                    <input type="checkbox" id="showWindKph" /> kph
                  </label>
                  <label style="display:flex;align-items:center;gap:4px;font-size:12px;white-space:nowrap;">
                    <input type="checkbox" id="showWindKnots" /> knots
                  </label>
                  <label style="display:flex;align-items:center;gap:4px;font-size:12px;white-space:nowrap;">
                    <input type="checkbox" id="showWindDir" checked /> direction
                  </label>
                </div>
              </div>
              <div class="settingsRow">
                <label>Speed Offset</label>
                <input type="range" id="windTopOffset" min="-80" max="80" value="0" style="width:100%;" />
                <span id="windTopOffsetLabel" style="font-size:11px;color:#aac;">0px</span>
              </div>
              <div class="settingsRow">
                <label>Direction Offset</label>
                <input type="range" id="windBotOffset" min="-80" max="80" value="0" style="width:100%;" />
                <span id="windBotOffsetLabel" style="font-size:11px;color:#aac;">0px</span>
              </div>
            </div>
            <div class="widgetResize"></div>
          </div>
        </div>

        <!-- Temperature -->
        <div class="widget" data-widget="temp" id="tempWidget">
          <div class="widgetFrame">
            <div class="widgetControls">
              <button class="widgetSettingsBtn" type="button" title="Widget settings">⚙</button>
              <button class="widgetHideBtn" type="button" title="Hide widget">👁</button>
            </div>
            <div class="widgetHandle"></div>
            <div class="tempBox">
              <div id="tempMain"></div>
              <div id="tempSub"></div>
            </div>
            <div class="widgetSettingsPanel" data-settings-for="temp">
              <div class="settingsHeader">
                <div class="settingsTitle">Temperature Widget</div>
                <button class="closeSettingsBtn" type="button">✕</button>
              </div>
              <div class="settingsRow">
                <label>Theme</label>
                <select class="themeSelect" data-setting="theme">
                  <option value="default">Default</option>
                  <option value="clean">Clean</option>
                  <option value="glass">Glass</option>
                  <option value="ocean">Ocean</option>
                  <option value="sunset">Sunset</option>
                </select>
              </div>
              <div class="settingsRow">
                <label>Widget Background</label>
                <input type="color" class="widgetBgColorInput" data-setting="backgroundColor" value="#0a1924">
              </div>
              <div class="settingsRow">
                <label>Row 1 Font</label>
                <select class="fontSelect" data-target="row1Font">
                  <option value="Segoe UI">Segoe UI</option>
                  <option value="Arial">Arial</option>
                  <option value="Verdana">Verdana</option>
                  <option value="Georgia">Georgia</option>
                  <option value="Trebuchet MS">Trebuchet MS</option>
                </select>
              </div>
              <div class="settingsRow">
                <label>Row 1 Font Color</label>
                <input type="color" class="fontColorInput" data-target="row1Color" value="#f5fbff">
              </div>
              <div class="settingsRow">
                <label>Row 1 Alert Color</label>
                <input type="color" class="alertColorInput" data-target="row1AlertColor" value="#ff7c7c">
              </div>
              <div class="settingsRow">
                <label>Row 2 Font</label>
                <select class="fontSelect" data-target="row2Font">
                  <option value="Segoe UI">Segoe UI</option>
                  <option value="Arial">Arial</option>
                  <option value="Verdana">Verdana</option>
                  <option value="Georgia">Georgia</option>
                  <option value="Trebuchet MS">Trebuchet MS</option>
                </select>
              </div>
              <div class="settingsRow">
                <label>Row 2 Font Color</label>
                <input type="color" class="fontColorInput" data-target="row2Color" value="#9fc2d9">
              </div>
              <div class="settingsRow">
                <label>Row 2 Alert Color</label>
                <input type="color" class="alertColorInput" data-target="row2AlertColor" value="#ff7c7c">
              </div>
              <div class="settingsActions">
                <button type="button" class="settingsActionBtn resetWidgetBtn">Default</button>
              </div>
            </div>
            <div class="widgetResize"></div>
          </div>
        </div>

        <!-- Tide Status -->
        <div class="widget" data-widget="tideStatus" id="tideStatusWidget">
          <div class="widgetFrame">
            <div class="widgetControls">
              <button class="widgetSettingsBtn" type="button" title="Widget settings">⚙</button>
              <button class="widgetHideBtn" type="button" title="Hide widget">👁</button>
            </div>
            <div class="widgetHandle"></div>
            <div class="lowTideAlert" id="lowTideAlert"></div>
            <div class="currentTide" id="currentTide"></div>
            <div class="widgetSettingsPanel" data-settings-for="tideStatus">
              <div class="settingsHeader">
                <div class="settingsTitle">Tide Status Widget</div>
                <button class="closeSettingsBtn" type="button">✕</button>
              </div>
              <div class="settingsRow">
                <label>Theme</label>
                <select class="themeSelect" data-setting="theme">
                  <option value="default">Default</option>
                  <option value="clean">Clean</option>
                  <option value="glass">Glass</option>
                  <option value="ocean">Ocean</option>
                  <option value="sunset">Sunset</option>
                </select>
              </div>
              <div class="settingsRow">
                <label>Widget Background</label>
                <input type="color" class="widgetBgColorInput" data-setting="backgroundColor" value="#0a1924">
              </div>
              <div class="settingsRow">
                <label>Row 1 Font</label>
                <select class="fontSelect" data-target="row1Font">
                  <option value="Segoe UI">Segoe UI</option>
                  <option value="Arial">Arial</option>
                  <option value="Verdana">Verdana</option>
                  <option value="Georgia">Georgia</option>
                  <option value="Trebuchet MS">Trebuchet MS</option>
                </select>
              </div>
              <div class="settingsRow">
                <label>Row 1 Font Color</label>
                <input type="color" class="fontColorInput" data-target="row1Color" value="#ff7c7c">
              </div>
              <div class="settingsRow">
                <label>Row 1 Alert Color</label>
                <input type="color" class="alertColorInput" data-target="row1AlertColor" value="#ff7c7c">
              </div>
              <div class="settingsRow">
                <label>Row 2 Font</label>
                <select class="fontSelect" data-target="row2Font">
                  <option value="Segoe UI">Segoe UI</option>
                  <option value="Arial">Arial</option>
                  <option value="Verdana">Verdana</option>
                  <option value="Georgia">Georgia</option>
                  <option value="Trebuchet MS">Trebuchet MS</option>
                </select>
              </div>
              <div class="settingsRow">
                <label>Row 2 Font Color</label>
                <input type="color" class="fontColorInput" data-target="row2Color" value="#dff6ff">
              </div>
              <div class="settingsRow">
                <label>Row 2 Alert Color</label>
                <input type="color" class="alertColorInput" data-target="row2AlertColor" value="#ff7c7c">
              </div>
              <div class="settingsActions">
                <button type="button" class="settingsActionBtn resetWidgetBtn">Default</button>
              </div>
            </div>
            <div class="widgetResize"></div>
          </div>
        </div>

        <!-- Forecast — middle section on mobile -->
        <div class="widget" data-widget="forecast" id="forecastWidget">
          <div class="widgetFrame">
            <div class="widgetControls">
              <button class="widgetSettingsBtn" type="button" title="Widget settings">⚙</button>
              <button class="widgetHideBtn" type="button" title="Hide widget">👁</button>
            </div>
            <div class="widgetHandle"></div>
            <div class="forecastWrap">
              <div class="forecast" id="forecast"></div>
            </div>
            <div class="widgetSettingsPanel" data-settings-for="forecast">
              <div class="settingsHeader">
                <div class="settingsTitle">Forecast Widget</div>
                <button class="closeSettingsBtn" type="button">✕</button>
              </div>
              <div class="settingsRow">
                <label>Theme</label>
                <select class="themeSelect" data-setting="theme">
                  <option value="default">Default</option>
                  <option value="clean">Clean</option>
                  <option value="glass">Glass</option>
                  <option value="ocean">Ocean</option>
                  <option value="sunset">Sunset</option>
                  <option value="dynamic">Animated Forecast</option>
                </select>
              </div>
              <div class="settingsRow">
                <label>Widget Background</label>
                <input type="color" class="widgetBgColorInput" data-setting="backgroundColor" value="#0a1924">
              </div>
              <div class="settingsRow">
                <label>Row 1 Font</label>
                <select class="fontSelect" data-target="row1Font">
                  <option value="Segoe UI">Segoe UI</option>
                  <option value="Arial">Arial</option>
                  <option value="Verdana">Verdana</option>
                  <option value="Georgia">Georgia</option>
                  <option value="Trebuchet MS">Trebuchet MS</option>
                </select>
              </div>
              <div class="settingsRow">
                <label>Row 1 Font Color</label>
                <input type="color" class="fontColorInput" data-target="row1Color" value="#f1fbff">
              </div>
              <div class="settingsRow">
                <label>Row 1 Alert Color</label>
                <input type="color" class="alertColorInput" data-target="row1AlertColor" value="#ff7c7c">
              </div>
              <div class="settingsRow">
                <label>Row 2 Font</label>
                <select class="fontSelect" data-target="row2Font">
                  <option value="Segoe UI">Segoe UI</option>
                  <option value="Arial">Arial</option>
                  <option value="Verdana">Verdana</option>
                  <option value="Georgia">Georgia</option>
                  <option value="Trebuchet MS">Trebuchet MS</option>
                </select>
              </div>
              <div class="settingsRow">
                <label>Row 2 Font Color</label>
                <input type="color" class="fontColorInput" data-target="row2Color" value="#9fc2d9">
              </div>
              <div class="settingsRow">
                <label>Row 2 Alert Color</label>
                <input type="color" class="alertColorInput" data-target="row2AlertColor" value="#ff7c7c">
              </div>
              <div class="settingsActions">
                <button type="button" class="settingsActionBtn resetWidgetBtn">Default</button>
              </div>
            </div>
            <div class="widgetResize"></div>
          </div>
        </div>

        <!-- Tide Chart — bottom section on mobile -->
        <div class="widget" data-widget="tideChart" id="tideChartWidget">
          <div class="widgetFrame">
            <div class="widgetControls">
              <button class="widgetSettingsBtn" type="button" title="Widget settings">⚙</button>
              <button class="widgetHideBtn" type="button" title="Hide widget">👁</button>
            </div>
            <div class="widgetHandle"></div>
            <div class="tideSection">
              <div class="tidePanel">
                <canvas id="tideChart"></canvas>
                <div id="tideLine"></div>
              </div>
            </div>
            <div class="widgetSettingsPanel" data-settings-for="tideChart">
              <div class="settingsHeader">
                <div class="settingsTitle">Tide Chart Widget</div>
                <button class="closeSettingsBtn" type="button">✕</button>
              </div>
              <div class="settingsRow">
                <label>Theme</label>
                <select class="themeSelect" data-setting="theme">
                  <option value="default">Default</option>
                  <option value="clean">Clean</option>
                  <option value="glass">Glass</option>
                  <option value="ocean">Ocean</option>
                  <option value="sunset">Sunset</option>
                </select>
              </div>
              <div class="settingsRow">
                <label>Widget Background</label>
                <input type="color" class="widgetBgColorInput" data-setting="backgroundColor" value="#0a1924">
              </div>
              <div class="settingsActions">
                <button type="button" class="settingsActionBtn resetWidgetBtn">Default</button>
              </div>
            </div>
            <div class="widgetResize"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js');
      });
    }
  </script>
</body>
</html>
